<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>施宇柔的個人網頁</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #fff;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .container:hover {
            transform: translateY(-5px);
        }
        .profile-img {
            width: 100px;
            height: 100px;
            background-color: #e0e0e0;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            color: #777;
        }
        h1 {
            margin: 0;
            color: #2c3e50;
            font-size: 1.8rem;
        }
        .info-box {
            margin-top: 1.5rem;
            text-align: left;
        }
        .info-item {
            background: #f9f9f9;
            margin-bottom: 0.8rem;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }
        .label {
            font-weight: bold;
            color: #7f8c8d;
            font-size: 0.85rem;
            display: block;
        }
        .value {
            color: #2c3e50;
            font-size: 1rem;
            word-break: break-all;
        }
        .btn-contact {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.7rem 1.5rem;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: background 0.3s;
        }
        .btn-contact:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-img">👤</div>
    <h1>施宇柔</h1>
    
    <div class="info-box">
        <div class="info-item">
            <span class="label">學號 STUDENT ID</span>
            <span class="value">111210317</span>
        </div>
        <div class="info-item">
            <span class="label">電子郵件 EMAIL</span>
            <span class="value">sssuuuppppppeeerrr@gmail.com</span>
        </div>
    </div>

    <a href="mailto:sssuuuppppppeeerrr@gmail.com" class="btn-contact">寄信給我</a>
</div>

</body>
</html>
